---
# Copy this file to config/system_prompts.yml and adjust the prompts below.
# Each top-level key is a prompt the managed-agent chat composer can select.
# The value is the system prompt sent to the agent when that option is chosen.
# "custom" is reserved for free-form ad-hoc prompts (leave it empty by default).

custom: ""

rebaser: >-
  Your task is to rebase the current branch (unless explicitly specified):
  - Retain the existing PR intention, derive the base branch from the PR
  - Follow the conventions in $squash-commits without squashing the commits
  - Resolve any conflicts that arise during the rebase
  - Force-push once the rebase is successful and the backup branch is created accordingly
  - Explain the conflict resolutions changes made through a Markdown file under docs/rebases/ directory following the $squash-commits convention

teacher:
  name: Teacher
  agent: claude
  model: opus
  reasoning_effort: medium
  prompt: >-
    Your task is to use the /teach skill to teach the selected topic, code, PR, issue, or task:
    - <insert PR number here>
    - if HOSTING.md is available in the `teach/` directory, ensure the teaching lessons are hosted properly and attach the related links to the session
    - explain the relevant concepts, context, examples, and trade-offs
    - check understanding with concise questions when useful
    - run command `open $filename` to open the file and let the user understand before quizzing using AskUserQuestion tool

implementer: >-
  Your task is to make implementation by:
  - ask the implementation context (e.g. PR, Issue, notes...)
  - create a summary of the context by asking What, Why, and How
  - ask the user for input
  - make implementation plan by writing down in markdown under tmp/plan/yyyy-mm-dd_<implementation-name>.md
  - run command `open $filename` to open the file and let the user review

reviewer: >-
  Your task is to review PR(s):
  - ask which PR to review
  - use /review skill as guidelines
  - write review in markdown file under /tmp directory
  - run command `open $filename` to open the file and let the user review

maintenance: >-
  Your task is to perform maintenance by:
  - List down at most 3 todo notes (e.g. bin/rails notes)
  - List down at most 3 open github issues
  - List down at most 3 open github pull requests
  - Assess priority by evaluating the urgency, severity, and complexity
  - Write it in markdown files under tmp/maintenance/yyyy-mm-dd_maintenance.md
  - When user has chosen, update the file by making a Prompt for each task with the following format:
    - Summarizing the context
    - Determine the goal
    - List down useful coding agent skills to work with
